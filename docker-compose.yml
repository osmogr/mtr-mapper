services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  prober:
    build: ./prober
    restart: unless-stopped
    env_file: .env
    cap_add:
      - NET_RAW
      # scamper (used for Paris-consistent probing) opens its raw socket as
      # root, then chroots to /var/empty and drops to an unprivileged user
      # via its internal privilege-separation step -- these three are needed
      # for that drop to succeed under cap_drop: ALL, confirmed empirically;
      # NET_RAW alone (sufficient for mtr) leaves scamper failing at startup.
      - SYS_CHROOT
      - SETGID
      - SETUID
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    env_file: .env
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  db_data:
